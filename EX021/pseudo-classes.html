    <title>links</title>
    <style>
        body{
            font-family: 'Courier New', Courier, monospace;
        }
    
    a{
        color: red;
        text-decoration: none;
    }

    a:visited{
        color: rgb(112, 17, 17);
    }

    a:hover{
        text-decoration: underline;
        color: black;
    }

    a:active{
        color: yellow;
    }

    a::after{
        content:  '[link]';
        text-decoration: none;
        font-weight: normal;
        color: darkgray;
    }
</style>
</head>
